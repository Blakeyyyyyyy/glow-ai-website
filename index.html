<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow AI - Create Anything with Just Text</title>
    <link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo-section">
                <img src="app-icon.png" alt="Glow AI" class="app-icon">
                <h1 class="logo-text">Glow AI</h1>
            </div>
            <a href="#" class="app-store-link" id="appStoreLink">
                <img src="app-store-badge.png" alt="Download on the App Store" class="app-store-badge">
            </a>
        </header>

        <!-- Main Content -->
        <main>
            <h2 class="main-heading">Create Anything with Just Text</h2>
            
            <!-- Infinite Scrolling Carousel with Fading Images -->
            <div class="carousel-container">
                <div class="carousel-track" id="carouselTrack">
                    <!-- Cards will be duplicated via JavaScript for infinite scroll -->
                    <div class="carousel-card" data-before="images/anime_before.png" data-after="images/anime_after.png">
                        <img class="card-image before" src="images/anime_before.png" alt="Before">
                        <img class="card-image after" src="images/anime_after.png" alt="After">
                    </div>
                    <div class="carousel-card" data-before="images/barbie_before.png" data-after="images/barbie_after.png">
                        <img class="card-image before" src="images/barbie_before.png" alt="Before">
                        <img class="card-image after" src="images/barbie_after.png" alt="After">
                    </div>
                    <div class="carousel-card" data-before="images/caricature_before.png" data-after="images/caricature_after.png">
                        <img class="card-image before" src="images/caricature_before.png" alt="Before">
                        <img class="card-image after" src="images/caricature_after.png" alt="After">
                    </div>
                    <div class="carousel-card" data-before="images/actionfigure_before.png" data-after="images/actionfigure_after.png">
                        <img class="card-image before" src="images/actionfigure_before.png" alt="Before">
                        <img class="card-image after" src="images/actionfigure_after.png" alt="After">
                    </div>
                    <div class="carousel-card" data-before="images/gtav_before.png" data-after="images/gtav_after.png">
                        <img class="card-image before" src="images/gtav_before.png" alt="Before">
                        <img class="card-image after" src="images/gtav_after.png" alt="After">
                    </div>
                    <div class="carousel-card" data-before="images/wedding_before.png" data-after="images/wedding_after.png">
                        <img class="card-image before" src="images/wedding_before.png" alt="Before">
                        <img class="card-image after" src="images/wedding_after.png" alt="After">
                    </div>
                    <div class="carousel-card" data-before="images/minecraft_before.png" data-after="images/minecraft_after.png">
                        <img class="card-image before" src="images/minecraft_before.png" alt="Before">
                        <img class="card-image after" src="images/minecraft_after.png" alt="After">
                    </div>
                    <div class="carousel-card" data-before="images/yearbook_before.png" data-after="images/yearbook_after.png">
                        <img class="card-image before" src="images/yearbook_before.png" alt="Before">
                        <img class="card-image after" src="images/yearbook_after.png" alt="After">
                    </div>
                    <div class="carousel-card" data-before="images/snow_before.png" data-after="images/snow_after.png">
                        <img class="card-image before" src="images/snow_before.png" alt="Before">
                        <img class="card-image after" src="images/snow_after.png" alt="After">
                    </div>
                    <div class="carousel-card" data-before="images/polaroid_before.png" data-after="images/polaroid_after.png">
                        <img class="card-image before" src="images/polaroid_before.png" alt="Before">
                        <img class="card-image after" src="images/polaroid_after.png" alt="After">
                    </div>
                    <div class="carousel-card" data-before="images/partner_before.png" data-after="images/partner_after.png">
                        <img class="card-image before" src="images/partner_before.png" alt="Before">
                        <img class="card-image after" src="images/partner_after.png" alt="After">
                    </div>
                    <div class="carousel-card" data-before="images/age_before.png" data-after="images/age_after.png">
                        <img class="card-image before" src="images/age_before.png" alt="Before">
                        <img class="card-image after" src="images/age_after.png" alt="After">
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer>
            <div class="footer-links">
                <a href="privacy">Privacy Policy</a>
                <span class="separator">•</span>
                <a href="terms">Terms of Service</a>
                <span class="separator">•</span>
                <a href="contact">Contact</a>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
